<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GROQ AI - Smart Answer Box</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-xl bg-white rounded-2xl shadow-xl p-6 space-y-4">
    <h1 class="text-2xl font-bold text-center text-blue-600">Ask Anything with GROQ AI 🤖</h1>
    
    <textarea id="question" rows="3" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Type your question here..."></textarea>
    
    <button id="askBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
      Ask Question
    </button>
    
    <div id="answer" class="p-4 bg-gray-50 border rounded-lg text-sm space-y-4"></div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
