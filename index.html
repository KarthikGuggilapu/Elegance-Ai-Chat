<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GROQ Chat AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #888; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body class="bg-gradient-to-r from-slate-100 to-slate-200 text-gray-800 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-3xl bg-white rounded-2xl shadow-xl flex flex-col h-[90vh] overflow-hidden">
    <div class="p-4 border-b bg-blue-600 text-white text-center text-xl font-semibold">💬 Chat with GROQ AI</div>

    <div id="chatBox" class="flex-1 overflow-y-auto px-6 py-4 space-y-4 text-sm"></div>

    <div class="p-4 border-t bg-gray-50 flex gap-2">
      <textarea id="question" rows="2" class="flex-1 border border-gray-300 rounded-lg p-3 resize-none focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Type your message..."></textarea>
      <button id="askBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Send</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
